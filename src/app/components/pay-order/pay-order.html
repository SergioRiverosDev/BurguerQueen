<div class="row mt-4">
    <div class="col-12">

        <mat-stepper  orientation="vertical" #stepper (selectionChange)="createPaymentIntent($event)">

            <mat-step >
                <ng-template matStepLabel>{{'label.check.order' |translate}}</ng-template>

                <app-order-status />

                <div>
                    <button class="btn color-button-next mt-2" matButton
                        matStepperNext>{{'label.next'|translate}}</button>
                </div>
            </mat-step>

            <mat-step>
                <ng-template matStepLabel >{{'label.pay.order'|translate }}</ng-template>
                
                <div class="mt-4">

                    @if (elementsOptions.clientSecret) {
                    <ngx-stripe-elements [stripe]="stripe" [elementsOptions]="elementsOptions" class="mt-4">
                        <ngx-stripe-payment [options]="paymentElementOptions" />
                    </ngx-stripe-elements>
                    <button (click)="payOrder()" class="btn color-button-next mt-4">{{'label.pay.order'|translate}}</button>
                    }
                </div>

                <div>
                    <button class="btn color-button-next mt-2" matButton
                        matStepperPrevious>{{'label.previous'|translate}}</button>
                </div>
            </mat-step>
        </mat-stepper>


    </div>
</div>
