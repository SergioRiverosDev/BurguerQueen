<div class="row pt-3">
    <div class="col-12">

        <div class="row justify-content-center">
            @if (product$ |async; as product) {

            <div class="row text-center">
                <h3 class="mb-3">{{product.name |translate}}</h3>
                <mat-divider></mat-divider>
            </div>

            <div class="col-12 mt-3">
                <a class="btn btn-outline-primary mb-2" style="width: 100px; text-decoration: none; position: absolute;" (click)="goBack()">
                    <ion-icon class="pt-1" name="arrow-back-outline"></ion-icon>
                    {{'label.back'|translate }}
                </a>
            </div>

            <div class="col-lg-2 col-md-4 col-6 p-3 d-flex card-style">

                <mat-card class="bg-white text-center w-100 h-100 " appearance="outlined">

                    <img mat-card-image class="p-4 img-card" [src]="'/img/products/'+product.img" [alt]="product.name">

                    <mat-card-content class="bg-primary rounded-bottom text-white p-2 mt-auto">
                        <!--                             <h6 class=" text-center">
                                {{ product.name | translate }}
                            </h6> -->
                        <h5 class="bg-white text-primary rounded align-content-center pt-1"> {{product.price}} €</h5>
                    </mat-card-content>

                </mat-card>

            </div>

            <div class="col-12 d-flex align-items-center justify-content-center mb-2">
                <button class="btn btn-primary px-4"><ion-icon class="mt-2" name="remove-outline"></ion-icon></button>
                <h3 class="align-content-center mt-1 mx-3 border rounded p-2 px-3">1</h3>
                <button class="btn btn-primary px-4"><ion-icon class="mt-2" name="add-outline"></ion-icon></button>
            </div>

            <div class="col-12 d-flex flex-column align-items-center">
                <button class="btn btn-primary mb-2 " style="width: 215px;" (click)="addProduct(product)">
                    <ion-icon class="pt-1" name="bag-add-outline"></ion-icon>
                    {{'label.add.product'|translate }}
                </button>


            </div>

            }
        </div>

    </div>
</div>
